name: hermes-gcp
runtime: python
description: Hermes Agent on GCP with Telegram, GitHub MCP, and ingress (Traefik or Cloudflare)

config:
  gcp:project:
    type: string
  gcp:zone:
    type: string
    default: us-central1-a
  hermes:instance_type:
    type: string
    default: e2-medium
  hermes:disk_size_gb:
    type: integer
    default: 20
  hermes:model:
    type: string
    default: deepseek/deepseek-chat
  hermes:ingress_mode:
    type: string
    default: cloudflare-named
  hermes:hostname:
    type: string
  hermes:acme_email:
    type: string
  hermes:telegram_webhook:
    type: boolean
  hermes:tunnel_mode:
    type: string
  cloudflare:account_id:
    type: string
  cloudflare:zone_id:
    type: string
  cloudflare:hostname:
    type: string
  cloudflare:tunnel_secret:
    type: string
    secret: true
  openrouter_api_key:
    type: string
    secret: true
  telegram_bot_token:
    type: string
    secret: true
  telegram_allowed_users:
    type: string
    secret: true
  github_pat:
    type: string
    secret: true
    default: ""
