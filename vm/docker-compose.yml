services:
  hermes:
    image: nousresearch/hermes-agent:latest
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    ports:
      - "8642:8642"
      - "9119:9119"
      - "8443:8443"
    volumes:
      - /opt/hermes-data:/root/.hermes
    environment:
      HERMES_DASHBOARD: "1"
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: "0.0.0.0"
      HERMES_ALLOW_ROOT_GATEWAY: "1"
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
